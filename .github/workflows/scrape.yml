name: Weekly Procurement Scraper

on:
  schedule:
    # Runs at 03:00 AM UTC every Monday
    - cron: '0 3 * * 1'
  workflow_dispatch: # This adds a "Run Now" button on GitHub so you can test it!

# This tells GitHub WHAT to do
jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the ETL Pipeline
        run: |
          python src/main.py

      - name: Commit and push the new data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add exports/red_flags_with_winners.json
          git add exports/top_winning_companies.png
          # If there are no changes, do nothing. If there are, commit them!
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated data update: Weekly Procurement Red Flags"
          git push